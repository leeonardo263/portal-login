<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0D1123;
  color:white;
}

#loginScreen {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0D1123;
}

.login-box {
  background:#141929;
  padding:30px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

input {
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:10px;
  background:#F5821F;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>Login</h2>
    <input id="user" placeholder="Email">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p id="erro" style="color:red;"></p>
  </div>
</div>

<h1 style="text-align:center;margin-top:40px;">Sistema Liberado 🚀</h1>

<!-- SUPABASE -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// cria apenas uma vez (evita erro de duplicação)
window.supabaseClient = window.supabaseClient || window.supabase.createClient(
  "https://dgcswgwtylygpyqkpiol.supabase.co",
  "sb_publishable_tNIleylQBeGasd8C6jYMmA_a8Rb0HbA"
);

// LOGIN
window.login = async function() {
  const email = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  const { error } = await window.supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("erro").innerText = "Login inválido";
  } else {
    document.getElementById("loginScreen").style.display = "none";
  }
};

// CHECK LOGIN
window.addEventListener("load", async () => {
  const { data } = await window.supabaseClient.auth.getSession();
  if (data.session) {
    document.getElementById("loginScreen").style.display = "none";
  }
});
</script>

</body>
</html>
