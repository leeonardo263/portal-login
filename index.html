<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;background:#0D1123;color:white;font-family:Arial;">

<div id="loginScreen" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;">
  <div style="background:#141929;padding:30px;border-radius:12px;width:300px;text-align:center;">
    <h2>Login</h2>
    <input id="user" placeholder="Email"><br><br>
    <input id="pass" type="password" placeholder="Senha"><br><br>
    <button onclick="login()">Entrar</button>
    <p id="erro" style="color:red;"></p>
  </div>
</div>

<h1 style="text-align:center;margin-top:40px;">Sistema Liberado 🚀</h1>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// NÃO usa variável global duplicável
window.login = async function () {
  const client = window.supabase.createClient(
    "https://dgcswgwtylygpyqkpiol.supabase.co",
    "sb_publishable_tNIleylQBeGasd8C6jYMmA_a8Rb0HbA"
  );

  const email = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  const { error } = await client.auth.signInWithPassword({ email, password });

  if (error) {
    document.getElementById("erro").innerText = "Login inválido";
  } else {
    document.getElementById("loginScreen").style.display = "none";
  }
};

window.addEventListener("load", async () => {
  const client = window.supabase.createClient(
    "https://dgcswgwtylygpyqkpiol.supabase.co",
    "sb_publishable_tNIleylQBeGasd8C6jYMmA_a8Rb0HbA"
  );

  const { data } = await client.auth.getSession();

  if (data.session) {
    document.getElementById("loginScreen").style.display = "none";
  }
});
</script>

</body>
</html>
