<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;background:#0D1123;color:white;font-family:Arial;">

<!-- LOGIN -->

<div id="loginScreen" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0D1123;">
  <div style="background:#141929;padding:30px;border-radius:12px;width:300px;text-align:center;">
    <h2>Login</h2>
    <input id="user" placeholder="Email" style="width:100%;margin-bottom:10px;padding:10px;border-radius:8px;border:none;">
    <input id="pass" type="password" placeholder="Senha" style="width:100%;margin-bottom:10px;padding:10px;border-radius:8px;border:none;">
    <button onclick="login()" style="width:100%;padding:10px;background:#F5821F;border:none;border-radius:8px;color:white;">Entrar</button>
    <p id="erro" style="color:red;"></p>
  </div>
</div>

<h1 style="text-align:center;margin-top:40px;">Sistema Liberado 🚀</h1>

<!-- IMPORTANTE: script no final -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://dgcswgwtylygpyqkpiol.supabase.co";
const SUPABASE_KEY = "sb_publishable_tNIleylQBeGasd8C6jYMmA_a8Rb0HbA";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// torna global
window.login = async function() {
  const email = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    document.getElementById("erro").innerText = "Login inválido";
  } else {
    document.getElementById("loginScreen").style.display = "none";
  }
};

window.checkLogin = async function() {
  const { data } = await supabase.auth.getSession();
  if (data.session) {
    document.getElementById("loginScreen").style.display = "none";
  }
};

window.addEventListener("load", checkLogin);
</script>

</body>
</html>
